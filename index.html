        <!-- SIDEBAR INTERACTIVE SHOPPING CART -->
        <aside class="cart-sidebar">
            <h2>Your Cart</h2>
            <ul id="cart-items">
                <!-- Appended cart items inject here dynamically -->
            </ul>
            
            <div class="cart-total">
                <span>Total:</span>
                <span>$<span id="cart-total">0.00</span></span>
            </div>

            <!-- CLEAR CART BUTTON -->
            <button onclick="clearCart()" class="clear-btn">Clear Cart</button>

            <!-- MANUAL CHECKOUT INBOX FORM -->
            <form action="https://web3forms.com" method="POST" id="order-form">
                <input type="hidden" name="access_key" value="YOUR_FORM_ENDPOINT_HERE">
                
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="Customer Name" required>

                <label for="email">Your Email:</label>
                <input type="email" id="email" name="Customer Email" required>

                <textarea name="Order Details" id="hidden-order-data" style="display: none;"></textarea>

                <button type="submit" class="submit-btn" style="margin-top: 10px;">Submit Order via Email</button>
            </form>
        </aside>
    </div>

    <!-- APPENDING CART JAVASCRIPT LOGIC -->
    <script>
        let cart = [];

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
        }

        // Removals function: targets the specific array index placement
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        // Clear function: wipes out the entire memory array instantly
        function clearCart() {
            cart = [];
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');
            const hiddenInput = document.getElementById('hidden-order-data');
            
            list.innerHTML = '';
            let total = 0;
            let orderSummaryText = '';

            // Incorporating array indices to handle tracking individual row deletions
            cart.forEach((item, index) => {
                const li = document.createElement('li');
                
                const nameSpan = document.createElement('span');
                nameSpan.textContent = item.name;
                
                const rightGroup = document.createElement('div');
                rightGroup.style.display = 'flex';
                rightGroup.style.alignItems = 'center';
                rightGroup.style.gap = '10px';

                const priceSpan = document.createElement('span');
                priceSpan.textContent = `$${item.price.toFixed(2)}`;
                
                // Creates an individual small "X" removal link structure
                const removeBtn = document.createElement('button');
                removeBtn.innerHTML = '&times;';
                removeBtn.className = 'remove-item-btn';
                removeBtn.onclick = () => removeFromCart(index);
                
                rightGroup.appendChild(priceSpan);
                rightGroup.appendChild(removeBtn);
                
                li.appendChild(nameSpan);
                li.appendChild(rightGroup);
                list.appendChild(li);
                
                total += item.price;
                orderSummaryText += `- ${item.name} ($${item.price.toFixed(2)})\n`;
            });

            totalSpan.textContent = total.toFixed(2);
            hiddenInput.value = `New Order from Next Layer Printing!\n\nItems Ordered:\n${orderSummaryText}\nGrand Total: $${total.toFixed(2)}`;
        }
    </script>
</body>
</html>
